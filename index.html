<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!--MOBILE CRITICAL: prevents browser zoom, fixes viewport on all phones -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Allows embedding inside iframes on other websites -->
  <meta http-equiv="X-Frame-Options" content="ALLOWALL" />

  <!--iOS Safari full-screen web app support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>3D Logo</title>

  <style>
    /* Hard reset — no gaps on any device provided */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;    /* no scroll bars provided */
      background: #08080f;
      /* Prevents iOS Safari bounce/rubber-band scroll */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      /* KEY MOBILE FIX: stops browser hijacking touch for scroll/zoom Without this, dragging the model also scrolls the page on phones */
      touch-action: none;
    }
  </style>

  <!-- Three.js import map — same CDN, works on all devices/browsers -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161/examples/jsm/"
    }
  }
  </script>

</head>

<body>
  <script type="module" src="./main.js"></script>
</body>
</html>
